$schema: "http://json-schema.org/draft-06/schema#"

title: networkservices v1alpha1 ServiceBindingDestination export schema
description: A gcloud export/import command YAML validation schema.
type: object
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  services:
    description: |-
      The service URIs to which the ServiceBinding resource is bound. Can be one
      of the following (all the service URIs should have the same type):
      `//compute.googleapis.com/projects/*/regions/*/serviceAttachments/`; `//
      apphub.googleapis.com/projects/*/locations/*/applications//services/`;
      `//run.googleapis.com/projects/*/locations/*/services/`. If an AppHub
      service is provided, the underlying service needs to be PSC service
      attachment.
    type: array
    items:
      type: string
