$schema: "http://json-schema.org/draft-06/schema#"

title: networkservices v1alpha1 ServiceBindingSource export schema
description: A gcloud export/import command YAML validation schema.
type: object
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  services:
    description: |-
      A list of resources attached to the ServiceBinding. The resources can be
      TargetHttpProxy or TargetHttpsProxy. The location of the resources must
      match the location of the ServiceBinding.
    type: array
    items:
      type: string
