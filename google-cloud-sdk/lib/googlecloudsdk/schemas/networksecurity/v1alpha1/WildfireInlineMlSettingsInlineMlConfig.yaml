$schema: "http://json-schema.org/draft-06/schema#"

title: networksecurity v1alpha1 WildfireInlineMlSettingsInlineMlConfig export schema
description: A gcloud export/import command YAML validation schema.
type: object
required:
- action
- fileType
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  action:
    description: Action to take when a threat is detected using Inline ML.
    type: string
    enum:
    - ALERT
    - DISABLE
    - ENABLE
    - INLINE_ML_ACTION_UNSPECIFIED
  fileType:
    description: File type to configure Inline ML for.
    type: string
    enum:
    - ELF
    - INLINE_ML_CONFIG_UNSPECIFIED
    - MACHO
    - MS_OFFICE
    - OOXML
    - POWERSHELL_SCRIPT1
    - POWERSHELL_SCRIPT2
    - SHELL
    - WINDOWS_EXECUTABLE
