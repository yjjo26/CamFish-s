$schema: "http://json-schema.org/draft-06/schema#"

title: networksecurity v1alpha1 WildfireThreatOverride export schema
description: A gcloud export/import command YAML validation schema.
type: object
required:
- action
- threatId
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  action:
    description: Threat action override.
    type: string
    enum:
    - WILDFIRE_ALERT
    - WILDFIRE_ALLOW
    - WILDFIRE_DEFAULT_ACTION
    - WILDFIRE_DENY
    - WILDFIRE_THREAT_ACTION_UNSPECIFIED
  threatId:
    description: Threat ID to match.
    type: string
