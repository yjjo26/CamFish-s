- release_tracks: [ALPHA]
  help_text:
    brief: Query Dataplex Catalog using SQL.
    description: |
      Retrieves metadata from the Dataplex Catalog using an SQL query.
    examples: |
      To query all rows from a table in us-central1, run:
      {command} --project=test-project --location=us-central1 --query="SELECT * FROM entries"
  request:
    collection: dataplex.projects.locations
    api_version: v1
    method: queryCatalog
  arguments:
    resource:
      help_text: |
        The location for the query.
      spec: !REF googlecloudsdk.command_lib.dataplex.resources:location
      is_positional: false
    params:
    - group:
        mutex: true
        required: true
        params:
        - arg_name: query
          api_field: googleCloudDataplexV1QueryCatalogRequest.query
          help_text: |
            The SQL query string.
        - arg_name: reference-id
          api_field: googleCloudDataplexV1QueryCatalogRequest.referenceId
          help_text: |
            The reference ID from a previous query to fetch results.
