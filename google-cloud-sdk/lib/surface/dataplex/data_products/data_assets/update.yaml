- release_tracks: [ALPHA]
  hidden: true
  help_text:
    brief: |
      Update a Dataplex data asset resource.
    description: |
      Update a Dataplex data asset resource.
    examples: |
      To update labels on a Dataplex data asset `test-da` in data product `test-dp` in location `us-central1`, run:

          $ {command} test-da --data-product=test-dp --location=us-central1 --update-labels=k1=v1

  request:
    ALPHA:
      api_version: v1
    collection: dataplex.projects.locations.dataProducts.dataAssets
  arguments:
    resource:
      help_text: |
        Arguments and flags that specify the Dataplex Data Asset you want to update.
      spec: !REF googlecloudsdk.command_lib.dataplex.resources:data_asset
    params:
    - arg_name: access-groups
      api_field: googleCloudDataplexV1DataAsset.accessGroupConfigs.additionalProperties
      action: append
      processor: googlecloudsdk.command_lib.dataplex.parsers:ParseAccessGroupConfigs
      help_text: |
        New access groups configurations for this data asset.
        This will replace the existing configurations.
        Each access group config should be a JSON string.
        Expected schema:
          {
            "id": "group-id",
            "iam_roles": ["role-1", "role-2"]
          }
    labels:
      api_field: googleCloudDataplexV1DataAsset.labels
  async:
    collection: dataplex.projects.locations.operations
  update:
    read_modify_update: true
