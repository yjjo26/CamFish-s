release_tracks: [ALPHA]
hidden: true
help_text:
  brief: |
    Describe an artifact guard policy.
  description: |
    Returns the details of an artifact guard policy for a given policy name.
  examples: |
    To describe a policy named "organizations/123/locations/global/policies/myPolicy",
      $ {command} organizations/123/locations/global/policies/myPolicy
      OR
      $ {command} myPolicy --location=global --organization=123

request:
  api_version: v1alpha
  collection:
  - artifactscanguard.organizations.locations.policies
  - artifactscanguard.projects.locations.policies
  method: get

arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.scc.resources:organization_or_project_location_policy
    help_text: |
      The Artifact Guard policy to describe.
