release_tracks: [ALPHA]
hidden: true
help_text:
  brief: |
    Delete an artifact guard policy.
  description: |
    Delete an artifact guard policy for a given policy name. A policy in active state cannot be deleted.
  examples: |
    To delete a policy named "organizations/123/locations/global/policies/myPolicy",
      $ {command} organizations/123/locations/global/policies/myPolicy
      OR
      $ {command} myPolicy --location=global --organization=123

request:
  api_version: v1alpha
  collection:
  - artifactscanguard.organizations.locations.policies
  - artifactscanguard.projects.locations.policies
  method: delete

arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.scc.resources:organization_or_project_location_policy
    help_text: |
      The full name of the policy to delete. The parent of the policy can be
      either an organization or a project. For example:
      `organizations/123/locations/global/policies/myPolicy` or
      `projects/123/locations/global/policies/myPolicy`.

  params:
  - arg_name: etag
    api_field: etag
    help_text: |
      The etag of the policy to delete.
