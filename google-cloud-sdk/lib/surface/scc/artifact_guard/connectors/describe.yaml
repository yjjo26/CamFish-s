release_tracks: [ALPHA]
help_text:
  brief: Describe an artifact guard connector.
  description: |
    Describe an artifact guard connector for a given connector name.
  examples: |
    To describe a connector named `organizations/123/locations/global/connectors/myConnector`:
      $ {command} organizations/123/locations/global/connectors/myConnector
      OR
      $ {command} myConnector --location=global --organization=123
request:
  collection:
  - artifactscanguard.organizations.locations.connectors
  - artifactscanguard.projects.locations.connectors
  api_version: v1alpha
  method: get
arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.scc.resources:organization_or_project_location_connector
    help_text: |
      The Artifact Guard connector to describe.
